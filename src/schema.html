<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./schema.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="./schema.ts" defer></script>
    <style id="column-stylesheet" type="text/css"></style>
  </head>

  <body>
    <iframe id="page">
    </iframe>
    <div id="pagenav-bar">
      <div>
        <label for="page-size-input">Rows per Page:&nbsp;</label>
        <input type="number" class="number-input" id="page-size-input">
      </div>
      <div>
        <button id="first-page-button"><img src="/src-tauri/icons/first_page.png"></button>
        <button id="prev-page-button"><img src="/src-tauri/icons/prev_page.png"></button>
        <label for="page-num-input">&nbsp;Page</label>
        <input type="number" class="number-input" id="page-num-input">
        <span>&nbsp;</span>
        <button id="next-page-button"><img src="/src-tauri/icons/next_page.png"></button>
        <button id="last-page-button"><img src="/src-tauri/icons/last_page.png"></button>
      </div>
    </div>
  </body>
</html>
