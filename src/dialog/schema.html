<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./schema.css" />
    <title>DungeonDB</title>
    <script type="module" src="./schema.ts"></script>
  </head>

  <body>
    <div class="tab-bar">
      <label for="general-tab-button" id="general-tab" class="input tab" tabindex="0">
          <input type="radio" name="tabs" id="general-tab-button" class="hidden" checked>
          General
      </label>
      <div class="container">
        <table class="form">
          <colgroup>
            <col span="1" class="field-name-cell">
            <col span="1" class="field-input-cell">
          </colgroup>
          <tbody>
            <tr>
              <td><label for="schema-name">Name:</label></td>
              <td><input id="schema-name" class="input" type="text" /></td>
            </tr>
            <tr>
              <td><label for="master-schema-select">Master List(s):</label></td>
              <td><select id="master-schema-select" class="input" multiple size="7"></select></td>
            </tr>
          </tbody>
        </table>
      </div>

      <label for="ordering-tab-button" id="ordering-tab" class="input tab" tabindex="0">
        <input type="radio" name="tabs" id="ordering-tab-button" class="hidden">
        Sort By
      </label>
      <div class="container">
        <table class="form">
          <colgroup>
            <col span="1" class="field-name-cell">
            <col span="1" class="field-input-cell">
          </colgroup>
          <tbody>
            
          </tbody>
        </table>
      </div>
    </div>


    <div class="dialog-buttons">
      <button id="confirm-button">OK</button>
      <button id="cancel-button">Cancel</button>
    </div>
  </body>
</html>
