<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./schema.css" />
    <title>DungeonDB</title>
    <script type="module" src="./schema.ts"></script>
  </head>

  <body>
    <div class="tab-bar">
      <label for="general-tab-button" id="general-tab" class="input tab" tabindex="0">
          <input type="radio" name="tabs" id="general-tab-button" class="hidden" checked>
          General
      </label>
      <div class="container">
        <table class="form">
          <colgroup>
            <col span="1" class="field-name-cell">
            <col span="1" class="field-input-cell">
          </colgroup>
          <tbody>
            <tr>
              <td><label for="schema-name">Name:<sup tooltip="The name of the schema. Names are not strictly required to be unique, but you should make them unique to avoid confusion.">?</sup></label></td>
              <td><input id="schema-name" class="input" type="text" /></td>
            </tr>
            <tr>
              <td><label for="master-schema-select">Master List(s):<sup tooltip="The schema will inherit columns from each master list, and each row of the schema will be associated with exactly one row in each master list. This is primarily useful if you want to define a polymorphic relationship between tables. As an example, suppose you have a Shape table defined with a column Name, and two tables (Circle, Triangle) that define Shape as a master list. Both Circle and Triangle will inherit the column Name from Shape, as well as being able to define their own columns specific to circles or triangles. Whenever a new Circle or Triangle is created, a new Shape will be created and linked to the Circle or Triangle. Then, whenever the Name of that Circle or Triangle is edited, the change will be propagated to the Shape it is linked to (and vice versa - if the Name of the Shape is edited, the change will propagate to the Circle or Triangle it is linked to).">?</sup></label></td>
              <td><select id="master-schema-select" class="input" multiple size="7"></select></td>
            </tr>
          </tbody>
        </table>
      </div>

      <label for="ordering-tab-button" id="ordering-tab" class="input tab" tabindex="0">
        <input type="radio" name="tabs" id="ordering-tab-button" class="hidden">
        Sort By
      </label>
      <div class="container">
        <table id="schema-ordering" class="">
          <thead>
            <td colspan="4" style="text-align: center;">Sort By<sup tooltip="The rows of the schema will automatically be sorted by these columns.">?</sup></td>
          </thead>
          <tbody>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="4" id="add-schema-ordering-column-button" class="clickable-text">Add a Column to Sort By</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <label for="grouping-tab-button" id="grouping-tab" class="input tab" tabindex="0">
        <input type="radio" name="tabs" id="grouping-tab-button" class="hidden">
        Group By
      </label>
      <div class="container">
        <table id="schema-grouping" class="">
          <thead>
            <td colspan="3" style="text-align: center;">Group By<sup tooltip="The rows of the report will be aggregated by unique combinations of values in these columns. If any columns are specified, then other columns must use an aggregation function (e.g. SUM).">?</sup></td>
          </thead>
          <tbody>
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3" id="add-schema-grouping-column-button" class="clickable-text">Add a Column to Group By</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <label for="filter-tab-button" id="filter-tab" class="input tab" tabindex="0">
          <input type="radio" name="tabs" id="filter-tab-button" class="hidden" checked>
          Filter
      </label>
      <div class="container">
        <table class="form">
          <colgroup>
            <col span="1" class="field-name-cell">
            <col span="1" class="field-input-cell">
          </colgroup>
          <tbody>
            <tr>
              <td><label for="schema-filter">Filter:<sup tooltip="A boolean formula that will be applied to the rows of the report. Any row for which this formula returns false will be excluded from the report. Leave this field blank to leave rows unfiltered.">?</sup></label></td>
              <td>
                <textarea id="schema-filter" class="input" type="text"></textarea>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <div class="dialog-buttons">
      <button id="confirm-button">OK</button>
      <button id="cancel-button">Cancel</button>
    </div>
  </body>
</html>
